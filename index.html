<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Let's Catch a Pokemon</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      gap: 20px;
      overflow: hidden;
    }

    /* 8-bit forest background pattern */
    #splash-screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        /* Sky */
        linear-gradient(180deg, #333 0%, #1a1a1a 40%),
        /* Trees pattern - left side */
        repeating-linear-gradient(90deg, 
          transparent 0px, 
          transparent 40px, 
          #222 40px, 
          #222 50px,
          transparent 50px,
          transparent 90px),
        /* Trees pattern - right side */
        repeating-linear-gradient(90deg,
          transparent 0px,
          transparent 50px,
          #222 50px,
          #222 60px,
          transparent 60px,
          transparent 100px);
      background-position: 0 0, 0 30%, 0 35%;
      background-size: 100% 100%, 100% 200px, 100% 200px;
      background-repeat: repeat-y;
      opacity: 0.8;
      z-index: -1;
    }

    /* Pixelated forest elements */
    #splash-screen::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background-image: 
        /* Ground grass pattern */
        repeating-linear-gradient(90deg,
          #1a1a1a 0px,
          #1a1a1a 10px,
          #222 10px,
          #222 20px),
        /* Bush shapes */
        radial-gradient(30px 20px at 20% 60%, #222, transparent),
        radial-gradient(25px 18px at 80% 65%, #222, transparent),
        radial-gradient(20px 15px at 50% 70%, #222, transparent);
      background-position: 0 0, 0 0, 0 0, 0 0;
      background-size: auto, auto, auto, auto;
      z-index: 0;
    }

    #splash-screen.hidden {
      display: none;
    }

    .splash-content {
      text-align: center;
      color: #ffffff;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .splash-content h1 {
      font-size: 48px;
      margin: 0;
      text-shadow: 3px 3px 0 #000, 6px 6px 0 #444;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
      font-weight: bold;
      letter-spacing: 2px;
      color: #fff;
    }

    .splash-content p {
      font-size: 16px;
      margin: 0;
      opacity: 0.9;
      letter-spacing: 1px;
      color: #ccc;
    }

    /* Loading container - centered */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
      max-width: 300px;
      padding: 20px;
    }

    .loading-bar {
      width: 100%;
      height: 20px;
      background: #1a1a1a;
      border: 3px solid #fff;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px #444, 0 0 10px rgba(0,0,0,0.5);
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, #fff, #ccc);
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: inset -2px 0 0 rgba(0,0,0,0.3);
    }

    .loading-text {
      font-size: 12px;
      opacity: 0.7;
      letter-spacing: 1px;
      color: #ccc;
      text-transform: uppercase;
    }

    #start-button {
      background: linear-gradient(135deg, #fff, #ddd);
      color: #000;
      border: 3px solid #000;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 0;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 3px 3px 0 #000;
      transition: all 0.1s ease;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
    }

    #start-button:hover:not(.loading) {
      transform: translateY(-2px);
      box-shadow: 5px 5px 0 #000;
    }

    #start-button:active:not(.loading) {
      transform: translateY(0);
      box-shadow: 2px 2px 0 #000;
    }

    #start-button.loading {
      opacity: 0.6;
      cursor: not-allowed;
      background: linear-gradient(135deg, #ccc, #999);
    }

    .pokeball-icon {
      font-size: 80px;
      animation: bounce 2s infinite;
      text-shadow: 3px 3px 0 #000;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    /* Responsive adjustments */
    @media (max-width: 640px) {
      .splash-content h1 {
        font-size: 32px;
        text-shadow: 2px 2px 0 #000, 4px 4px 0 #444;
      }

      .splash-content p {
        font-size: 14px;
      }

      .loading-bar {
        height: 16px;
        border: 2px solid #fff;
      }

      #start-button {
        padding: 12px 30px;
        font-size: 16px;
      }

      .pokeball-icon {
        font-size: 60px;
      }
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div class="splash-content">
      <div class="pokeball-icon">🔴⚪</div>
      <h1>CATCH POKEMON</h1>
      <p>8-BIT ADVENTURE</p>
      
      <div class="loading-container">
        <div class="loading-bar">
          <div class="loading-progress" id="progress"></div>
        </div>
        <div class="loading-text" id="loading-text">INITIALIZING...</div>
        <button id="start-button" class="loading">LOADING...</button>
      </div>
    </div>
  </div>

  <div id="game-wrap" style="display: none;">
    <header>
      <h1>Let's Catch a Pokemon</h1>
      <div id="hud">
        <div id="score">Caught: <span id="caught-count">0</span></div>
        <div id="player-stats">Level: <span id="player-level">1</span> XP: <span id="player-xp">0</span>/<span id="player-xp-next">100</span></div>
        <div id="last-result">Ready</div>
      </div>
    </header>

    <canvas id="game-canvas" width="640" height="480"></canvas>

    <aside id="inventory">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2>Inventory</h2>
        <div style="font-size:11px">Limit: <span id="inventory-limit">30</span></div>
      </div>
      <ul id="inventory-list"></ul>
      <div style="margin-top:8px;display:flex;gap:6px;">
        <button id="export-save">Export Save</button>
        <button id="import-save">Import Save</button>
        <button id="clear-save">Clear Save</button>
      </div>
    </aside>

    <footer>
      <div id="controls">Drag the Pokeball (bottom center) and release to throw. Touch supported. Click an inventory item to release it.</div>
    </footer>
  </div>

  <script src="js/pokemon-data.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/ui.js"></script>
  
  <script>
    // Loading screen controller
    let gameReady = false;
    const splash = document.getElementById('splash-screen');
    const gameWrap = document.getElementById('game-wrap');
    const startButton = document.getElementById('start-button');
    const progressBar = document.getElementById('progress');
    const loadingText = document.getElementById('loading-text');

    function updateProgress(percent, text) {
      progressBar.style.width = percent + '%';
      loadingText.textContent = text;
    }

    function initializeGame() {
      console.log('Initializing game...');
      updateProgress(30, 'LOADING ASSETS...');
      
      setTimeout(() => {
        try {
          // Check if required data is loaded
          if (!window.POKEMON || window.POKEMON.length === 0) {
            throw new Error('Pokemon data not loaded');
          }
          console.log('Pokemon data loaded:', window.POKEMON.length, 'pokemon');
          
          // Check if ASSETS exists
          if (!window.ASSETS) {
            console.warn('ASSETS library not available, using fallbacks');
          }
          
          updateProgress(70, 'INITIALIZING UI...');
          
          // Check if UI is loaded
          if (!window.UI) {
            throw new Error('UI module not loaded');
          }
          console.log('UI module loaded');
          
          updateProgress(100, 'READY!');
          
          gameReady = true;
          startButton.textContent = 'START GAME';
          startButton.classList.remove('loading');
          startButton.disabled = false;
          
          console.log('Game initialization complete');
        } catch (e) {
          console.error('Initialization error:', e);
          updateProgress(100, 'ERROR: ' + e.message);
          startButton.textContent = 'RETRY';
          startButton.classList.remove('loading');
          startButton.disabled = false;
        }
      }, 1000);
    }

    function startGame() {
      if (!gameReady) return;
      
      console.log('Starting game...');
      splash.classList.add('hidden');
      gameWrap.style.display = 'grid';
      
      // Initialize game loop
      setTimeout(() => {
        // Dynamically load game.js
        const script = document.createElement('script');
        script.src = 'js/game.js';
        script.onload = () => console.log('Game script loaded');
        script.onerror = () => console.error('Failed to load game script');
        document.body.appendChild(script);
      }, 100);
    }

    startButton.addEventListener('click', startGame);

    // Start initialization when page loads
    window.addEventListener('load', initializeGame);
    
    // Also try to initialize immediately in case window.load fires too late
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      initializeGame();
    }
  </script>
</body>
</html>
